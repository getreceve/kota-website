<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 60">
  <!-- Simplified dots pattern (triangular arrangement of ovals) -->
  <!-- Row 1 (top, 2 dots) -->
  <ellipse cx="10" cy="8"  rx="5" ry="3.5" fill="#45B3E7" transform="rotate(-30 10 8)"/>
  <ellipse cx="22" cy="5"  rx="5" ry="3.5" fill="#45B3E7" transform="rotate(-30 22 5)"/>
  <!-- Row 2 (3 dots) -->
  <ellipse cx="6"  cy="18" rx="5" ry="3.5" fill="#1A237E" transform="rotate(-30 6 18)"/>
  <ellipse cx="18" cy="14" rx="5" ry="3.5" fill="#1A237E" transform="rotate(-30 18 14)"/>
  <ellipse cx="30" cy="10" rx="5" ry="3.5" fill="#45B3E7" transform="rotate(-30 30 10)"/>
  <!-- Row 3 (3 dots) -->
  <ellipse cx="8"  cy="28" rx="5" ry="3.5" fill="#1A237E" transform="rotate(-30 8 28)"/>
  <ellipse cx="20" cy="24" rx="5" ry="3.5" fill="#1A237E" transform="rotate(-30 20 24)"/>
  <ellipse cx="32" cy="20" rx="5" ry="3.5" fill="#45B3E7" transform="rotate(-30 32 20)"/>
  <!-- Row 4 (3 dots) -->
  <ellipse cx="10" cy="38" rx="5" ry="3.5" fill="#45B3E7" transform="rotate(-30 10 38)"/>
  <ellipse cx="22" cy="34" rx="5" ry="3.5" fill="#1A237E" transform="rotate(-30 22 34)"/>
  <ellipse cx="34" cy="30" rx="5" ry="3.5" fill="#45B3E7" transform="rotate(-30 34 30)"/>
  <!-- Row 5 (2 dots) -->
  <ellipse cx="12" cy="48" rx="5" ry="3.5" fill="#45B3E7" transform="rotate(-30 12 48)"/>
  <ellipse cx="24" cy="44" rx="5" ry="3.5" fill="#45B3E7" transform="rotate(-30 24 44)"/>
  <!-- DebtPay text in sky blue, rounded -->
  <text x="48" y="46" font-family="Arial Rounded MT Bold, Arial, sans-serif" font-weight="700" font-size="42" fill="#45B3E7">DebtPay</text>
  <!-- pro text in dark navy italic -->
  <text x="282" y="46" font-family="Arial, sans-serif" font-weight="700" font-size="38" font-style="italic" fill="#1A237E">pro</text>
</svg>
