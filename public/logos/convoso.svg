<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 60">
  <!-- Simplified interlocked-diamond icon (horizontal, compact) -->
  <!-- Left diamond outline -->
  <rect x="4" y="10" width="36" height="36" rx="8" fill="none" stroke="#7B68EE" stroke-width="5"
        transform="rotate(45 22 28)"/>
  <!-- Right diamond outline (overlapping) -->
  <rect x="18" y="10" width="36" height="36" rx="8" fill="none" stroke="#7B68EE" stroke-width="5"
        transform="rotate(45 36 28)"/>
  <!-- convoso wordmark -->
  <text x="62" y="43" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="36" fill="#7B68EE" letter-spacing="-0.5">convoso</text>
</svg>
